<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Lyrics Maker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f7;
    color: #1a1a1a;
    min-height: 100vh;
  }

  header {
    background: #fff;
    border-bottom: 1px solid #e0e4ef;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #1e50a0;
    letter-spacing: 0.02em;
  }

  header .tagline {
    font-size: 12px;
    color: #888;
  }

  .main {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 0;
    height: calc(100vh - 53px);
  }

  /* ---- LEFT FORM PANEL ---- */
  .form-panel {
    background: #fff;
    border-right: 1px solid #e0e4ef;
    overflow-y: auto;
    padding: 24px 24px 32px;
  }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 16px;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #555;
    margin-bottom: 5px;
  }

  .field input, .field textarea {
    width: 100%;
    padding: 8px 10px;
    font-size: 13px;
    color: #1a1a1a;
    background: #fafbfd;
    border: 1px solid #d8dce8;
    border-radius: 7px;
    font-family: inherit;
    transition: border-color 0.15s;
    resize: none;
  }

  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: #7090cc;
    background: #fff;
  }

  .field textarea {
    min-height: 320px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.7;
  }

  .row2 { display: grid; grid-template-columns: 1fr 80px; gap: 8px; }

  .hint {
    font-size: 11px;
    color: #aaa;
    margin-top: 5px;
    line-height: 1.5;
  }

  .hint strong { color: #888; }

  .divider {
    border: none;
    border-top: 1px solid #eee;
    margin: 20px 0;
  }

  .btn-row { display: flex; flex-direction: column; gap: 8px; }

  .btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid #d8dce8;
    font-family: inherit;
    transition: background 0.15s;
  }

  .btn-primary {
    background: #1e50a0;
    color: #fff;
    border-color: #1e50a0;
  }
  .btn-primary:hover { background: #174090; }

  .btn-secondary {
    background: #fff;
    color: #444;
  }
  .btn-secondary:hover { background: #f4f5f8; }

  .btn-danger {
    background: #fff;
    color: #b04040;
    border-color: #f0d0d0;
  }
  .btn-danger:hover { background: #fff5f5; }

  /* ---- RIGHT PREVIEW PANEL ---- */
  .preview-panel {
    background: #e8eaf2;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .page {
    background: #fff;
    width: 100%;
    max-width: 600px;
    min-height: 840px;
    border-radius: 10px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    padding: 48px 52px 64px;
    font-family: Georgia, 'Times New Roman', serif;
  }

  .song-date {
    font-size: 11px;
    color: #999;
    font-family: -apple-system, sans-serif;
    margin-bottom: 14px;
  }

  .meta-box {
    background: #f4f6fb;
    border: 1px solid #c8d4ee;
    border-radius: 7px;
    padding: 14px 16px;
    margin-bottom: 24px;
    font-family: -apple-system, sans-serif;
  }

  .meta-box table { width: 100%; border-collapse: collapse; }

  .meta-box td {
    font-size: 12.5px;
    padding: 3.5px 0;
    vertical-align: top;
    line-height: 1.5;
  }

  .meta-box td.lbl {
    font-weight: 600;
    color: #5570aa;
    width: 64px;
    padding-right: 10px;
  }

  .meta-box td.val { color: #1a1a1a; }

  .music-line {
    text-align: center;
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: #1e50a0;
    margin: 22px 0 20px;
  }

  .lyric-block {
    font-size: 13.5px;
    line-height: 2.1;
    color: #222;
    padding-left: 10px;
    white-space: pre-wrap;
    margin-bottom: 8px;
  }

  .section-lbl {
    text-align: center;
    font-style: italic;
    font-size: 11.5px;
    color: #999;
    font-family: -apple-system, sans-serif;
    margin: 18px 0 14px;
  }

  /* ---- PRINT STYLES ---- */
  @media print {
    body { background: white; }
    header, .form-panel { display: none; }
    .main { display: block; height: auto; }
    .preview-panel {
      background: white;
      padding: 0;
      display: block;
    }
    .page {
      box-shadow: none;
      border-radius: 0;
      max-width: 100%;
      min-height: auto;
      padding: 10mm 16mm;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Song Lyrics Maker</h1>
  <span class="tagline">Fill in the details &rarr; Print or Save as PDF</span>
</header>

<div class="main">

  <!-- FORM -->
  <div class="form-panel">
    <div class="section-title">Song information</div>

    <div class="field">
      <label>Date</label>
      <input type="text" id="f-date" placeholder="e.g. April 10, 2026">
    </div>

    <div class="field">
      <label>Film / Album</label>
      <div class="row2">
        <input type="text" id="f-film" placeholder="Film or album name">
        <input type="text" id="f-year" placeholder="Year">
      </div>
    </div>

    <div class="field">
      <label>Song title</label>
      <input type="text" id="f-title" placeholder="Song title">
    </div>

    <div class="field">
      <label>Lyrics by</label>
      <input type="text" id="f-lyrics" placeholder="Lyricist name">
    </div>

    <div class="field">
      <label>Music by</label>
      <input type="text" id="f-music" placeholder="Music director / composer">
    </div>

    <div class="field">
      <label>Singer(s)</label>
      <input type="text" id="f-singers" placeholder="Singer names">
    </div>

    <hr class="divider">
    <div class="section-title">Lyrics</div>

    <div class="field">
      <textarea id="f-body" placeholder="Paste or type lyrics here...&#10;&#10;Leave a blank line between verses.&#10;&#10;Type Interlude (or Chorus, Bridge etc.) alone on its own line for a section label."></textarea>
      <div class="hint">
        Blank line = new verse &nbsp;|&nbsp; <strong>Interlude / Chorus / Bridge</strong> alone on a line = section label
      </div>
    </div>

    <hr class="divider">
    <div class="btn-row">
      <button class="btn btn-primary" onclick="window.print()">Save / Print as PDF</button>
      <button class="btn btn-secondary" onclick="clearForm()">Clear all fields</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="page" id="preview"></div>
  </div>

</div>

<script>
const SECTION_WORDS = ['interlude','chorus','bridge','verse','intro','outro','pre-chorus','refrain','coda','instrumental'];

function esc(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function render(){
  const date    = document.getElementById('f-date').value.trim();
  const film    = document.getElementById('f-film').value.trim();
  const year    = document.getElementById('f-year').value.trim();
  const title   = document.getElementById('f-title').value.trim();
  const lyricsBy= document.getElementById('f-lyrics').value.trim();
  const music   = document.getElementById('f-music').value.trim();
  const singers = document.getElementById('f-singers').value.trim();
  const body    = document.getElementById('f-body').value;

  let html = '';

  if(date) html += `<div class="song-date">${esc(date)}</div>`;

  const hasAny = film||title||lyricsBy||music||singers;
  if(hasAny){
    html += `<div class="meta-box"><table>`;
    if(film)     html += `<tr><td class="lbl">Film</td><td class="val">${esc(film)}${year ? ' <em>('+esc(year)+')</em>' : ''}</td></tr>`;
    if(title)    html += `<tr><td class="lbl">Song</td><td class="val">${esc(title)}</td></tr>`;
    if(lyricsBy) html += `<tr><td class="lbl">Lyrics</td><td class="val">${esc(lyricsBy)}</td></tr>`;
    if(music)    html += `<tr><td class="lbl">Music</td><td class="val">${esc(music)}</td></tr>`;
    if(singers)  html += `<tr><td class="lbl">Singers</td><td class="val">${esc(singers)}</td></tr>`;
    html += `</table></div>`;
  }

  html += `<div class="music-line">~ &nbsp; M U S I C &nbsp; ~</div>`;

  const paras = body.split(/\n{2,}/);
  paras.forEach(para => {
    const trimmed = para.trim();
    if(!trimmed) return;
    const lines = trimmed.split('\n').map(l => l.trimEnd());
    if(lines.length === 1 && SECTION_WORDS.includes(lines[0].trim().toLowerCase())){
      html += `<div class="section-lbl">&mdash;&nbsp; ${esc(lines[0].trim())} &nbsp;&mdash;</div>`;
    } else {
      html += `<div class="lyric-block">${lines.map(esc).join('\n')}</div><br>`;
    }
  });

  document.getElementById('preview').innerHTML = html;
}

function clearForm(){
  if(!confirm('Clear all fields and start fresh?')) return;
  ['f-date','f-film','f-year','f-title','f-lyrics','f-music','f-singers','f-body']
    .forEach(id => document.getElementById(id).value = '');
  render();
}

document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', render));
render();
</script>

</body>
</html>
