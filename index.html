<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Lyrics Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --ink-soft: #4a4a6a;
    --ink-muted: #9090b0;
    --accent: #c84b31;
    --accent-soft: #f5ede9;
    --blue: #1e50a0;
    --surface: #ffffff;
    --bg: #f2f0eb;
    --border: #e0ddd5;
    --field-bg: #faf9f7;
    --panel-w: 420px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ═══ HEADER ═══ */
  header {
    background: var(--ink);
    color: #fff;
    padding: 0 28px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: #fff;
  }

  header h1 span { color: var(--accent); font-style: italic; }

  .header-hint {
    font-size: 11.5px;
    color: rgba(255,255,255,0.45);
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  /* ═══ TABS (mobile) ═══ */
  .tabs {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .tabs button {
    flex: 1;
    padding: 11px;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ═══ LAYOUT ═══ */
  .main {
    display: grid;
    grid-template-columns: var(--panel-w) 1fr;
    height: calc(100vh - 52px);
  }

  /* ═══ FORM PANEL ═══ */
  .form-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 22px 40px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .section-label {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin: 20px 0 12px;
  }

  .section-label:first-child { margin-top: 0; }

  .field { margin-bottom: 10px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .field input, .field textarea {
    width: 100%;
    padding: 9px 11px;
    font-size: 13.5px;
    color: var(--ink);
    background: var(--field-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, background 0.15s;
  }

  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
  }

  .field input::placeholder, .field textarea::placeholder {
    color: #c0bdb5;
  }

  .field textarea {
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    line-height: 1.75;
    resize: vertical;
    min-height: 260px;
  }

  .row2 { display: grid; grid-template-columns: 1fr 90px; gap: 8px; }

  .hint-box {
    background: var(--accent-soft);
    border: 1px solid #e8c5bb;
    border-radius: 7px;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 11.5px;
    color: #7a3020;
    line-height: 1.6;
  }

  .hint-box strong { font-weight: 600; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0 6px;
  }

  /* ═══ BUTTONS ═══ */
  .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

  .btn {
    width: 100%;
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    border: 1.5px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #b03d26; }

  .btn-secondary {
    background: var(--field-bg);
    color: var(--ink-soft);
    border-color: var(--border);
  }
  .btn-secondary:hover { background: #ece9e2; }

  /* ═══ PREVIEW PANEL ═══ */
  .preview-panel {
    background: var(--bg);
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  /* ═══ SONG PAGE ═══ */
  .page {
    background: #fff;
    width: 100%;
    max-width: 580px;
    min-height: 800px;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.09);
    padding: 48px 52px 64px;
    font-family: 'Playfair Display', Georgia, serif;
  }

  .song-date {
    font-size: 11px;
    color: var(--ink-muted);
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 16px;
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .meta-box {
    background: #f7f5f0;
    border: 1px solid #e0dbd0;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 26px;
    font-family: 'DM Sans', sans-serif;
  }

  .meta-box table { width: 100%; border-collapse: collapse; }

  .meta-box td {
    font-size: 12.5px;
    padding: 3px 0;
    vertical-align: top;
    line-height: 1.6;
  }

  .meta-box td.lbl {
    font-weight: 600;
    color: var(--accent);
    width: 60px;
    padding-right: 10px;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .meta-box td.val { color: var(--ink); }

  .deco-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 22px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--ink-muted);
  }

  .deco-line::before, .deco-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .lyric-block {
    font-size: 14px;
    line-height: 2.15;
    color: #222;
    white-space: pre-wrap;
    margin-bottom: 6px;
  }

  .section-lbl {
    text-align: center;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-muted);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    margin: 22px 0 16px;
    letter-spacing: 0.05em;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink-muted);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; line-height: 1.7; }

  /* ═══ PRINT ═══ */
  @media print {
    body { background: white; }
    header, .tabs, .form-panel { display: none !important; }
    .main { display: block; height: auto; }
    .preview-panel {
      background: white;
      padding: 0;
      display: block;
    }
    .page {
      box-shadow: none;
      border-radius: 0;
      max-width: 100%;
      min-height: auto;
      padding: 10mm 16mm;
    }
  }

  /* ═══ MOBILE ═══ */
  @media (max-width: 720px) {
    :root { --panel-w: 100%; }

    header { padding: 0 16px; }
    .header-hint { display: none; }

    .tabs { display: flex; }

    .main {
      display: block;
      height: calc(100vh - 52px - 44px);
      overflow: hidden;
    }

    .form-panel {
      height: 100%;
      overflow-y: auto;
      border-right: none;
      padding: 16px 16px 40px;
    }

    .preview-panel {
      height: 100%;
      overflow-y: auto;
      padding: 16px 12px;
    }

    .page {
      padding: 28px 22px 40px;
      border-radius: 8px;
      min-height: unset;
    }

    .form-panel.hidden, .preview-panel.hidden {
      display: none;
    }
  }

  @media (max-width: 480px) {
    .row2 { grid-template-columns: 1fr 80px; }
  }
</style>
</head>
<body>

<header>
  <h1>Song Lyrics <span>Maker</span></h1>
  <span class="header-hint">Fill in details → Print / Save PDF</span>
</header>

<!-- Mobile tab switcher -->
<div class="tabs" id="tabs">
  <button class="active" onclick="switchTab('form')">✏️ Edit</button>
  <button onclick="switchTab('preview')">👁 Preview</button>
</div>

<div class="main">

  <!-- FORM -->
  <div class="form-panel" id="formPanel">

    <div class="section-label">Song details</div>

    <div class="field">
      <label>Date</label>
      <input type="text" id="f-date" placeholder="e.g. April 16, 2026">
    </div>

    <div class="field">
      <label>Film / Album</label>
      <div class="row2">
        <input type="text" id="f-film" placeholder="Film or album name">
        <input type="text" id="f-year" placeholder="Year">
      </div>
    </div>

    <div class="field">
      <label>Song title</label>
      <input type="text" id="f-title" placeholder="Song title">
    </div>

    <div class="field">
      <label>Lyrics by</label>
      <input type="text" id="f-lyrics" placeholder="Lyricist name">
    </div>

    <div class="field">
      <label>Music by</label>
      <input type="text" id="f-music" placeholder="Music director / composer">
    </div>

    <div class="field">
      <label>Singer(s)</label>
      <input type="text" id="f-singers" placeholder="e.g. Lata Mangeshkar">
    </div>

    <hr class="divider">
    <div class="section-label">Lyrics</div>

    <div class="field">
      <textarea id="f-body" placeholder="Paste or type lyrics here..."></textarea>
    </div>

    <div class="hint-box">
      <strong>Tips:</strong> Leave a blank line between verses.<br>
      Type <strong>Chorus</strong>, <strong>Interlude</strong>, <strong>Bridge</strong>, etc. alone on its own line to create a section label.
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="window.print()">
        🖨️ Save / Print as PDF
      </button>
      <button class="btn btn-secondary" onclick="clearForm()">
        🗑 Clear all fields
      </button>
    </div>

  </div>

  <!-- PREVIEW -->
  <div class="preview-panel" id="previewPanel">
    <div class="page" id="preview">
      <div class="empty-state">
        <div class="icon">🎵</div>
        <p>Start filling in the details<br>on the left to see your<br>song sheet appear here.</p>
      </div>
    </div>
  </div>

</div>

<script>
const SECTION_WORDS = ['interlude','chorus','bridge','verse','intro','outro','pre-chorus','refrain','coda','instrumental'];

function esc(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function render(){
  const date     = document.getElementById('f-date').value.trim();
  const film     = document.getElementById('f-film').value.trim();
  const year     = document.getElementById('f-year').value.trim();
  const title    = document.getElementById('f-title').value.trim();
  const lyricsBy = document.getElementById('f-lyrics').value.trim();
  const music    = document.getElementById('f-music').value.trim();
  const singers  = document.getElementById('f-singers').value.trim();
  const body     = document.getElementById('f-body').value;

  const anyField = date||film||title||lyricsBy||music||singers||body.trim();

  if(!anyField){
    document.getElementById('preview').innerHTML = `
      <div class="empty-state">
        <div class="icon">🎵</div>
        <p>Start filling in the details<br>on the left to see your<br>song sheet appear here.</p>
      </div>`;
    return;
  }

  let html = '';

  if(date) html += `<div class="song-date">${esc(date)}</div>`;

  const hasMeta = film||title||lyricsBy||music||singers;
  if(hasMeta){
    html += `<div class="meta-box"><table>`;
    if(film)     html += `<tr><td class="lbl">Film</td><td class="val">${esc(film)}${year?' <em>('+esc(year)+')</em>':''}</td></tr>`;
    if(title)    html += `<tr><td class="lbl">Song</td><td class="val">${esc(title)}</td></tr>`;
    if(lyricsBy) html += `<tr><td class="lbl">Lyrics</td><td class="val">${esc(lyricsBy)}</td></tr>`;
    if(music)    html += `<tr><td class="lbl">Music</td><td class="val">${esc(music)}</td></tr>`;
    if(singers)  html += `<tr><td class="lbl">Singers</td><td class="val">${esc(singers)}</td></tr>`;
    html += `</table></div>`;
  }

  if(body.trim()){
    html += `<div class="deco-line">♪ &nbsp; L Y R I C S &nbsp; ♪</div>`;

    const paras = body.split(/\n{2,}/);
    paras.forEach(para => {
      const trimmed = para.trim();
      if(!trimmed) return;
      const lines = trimmed.split('\n').map(l => l.trimEnd());
      if(lines.length === 1 && SECTION_WORDS.includes(lines[0].trim().toLowerCase())){
        html += `<div class="section-lbl">— ${esc(lines[0].trim())} —</div>`;
      } else {
        html += `<div class="lyric-block">${lines.map(esc).join('\n')}</div><br>`;
      }
    });
  }

  document.getElementById('preview').innerHTML = html;
}

function clearForm(){
  if(!confirm('Clear all fields and start fresh?')) return;
  ['f-date','f-film','f-year','f-title','f-lyrics','f-music','f-singers','f-body']
    .forEach(id => document.getElementById(id).value = '');
  render();
}

// Tab switching for mobile
function switchTab(tab){
  const formPanel = document.getElementById('formPanel');
  const previewPanel = document.getElementById('previewPanel');
  const btns = document.querySelectorAll('.tabs button');
  if(tab === 'form'){
    formPanel.classList.remove('hidden');
    previewPanel.classList.add('hidden');
    btns[0].classList.add('active');
    btns[1].classList.remove('active');
  } else {
    formPanel.classList.add('hidden');
    previewPanel.classList.remove('hidden');
    btns[1].classList.add('active');
    btns[0].classList.remove('active');
  }
}

document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', render));
render();
</script>

</body>
</html>
